version: '3.8'

services:
  # PostgreSQL database with required extensions
  postgres:
    image: postgres:15
    container_name: payroll-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payroll_system_dev
      POSTGRES_USER: payroll_user
      POSTGRES_PASSWORD: payroll_pass_dev_123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - payroll-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll_user -d payroll_system_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching, sessions, and rate limiting
  redis:
    image: redis:7-alpine
    container_name: payroll-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - payroll-network
    command: redis-server --appendonly yes --requirepass redis_pass_dev_123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass_dev_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: payroll-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@payroll.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - payroll-network
    depends_on:
      - postgres

  # Redis Commander for Redis management (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: payroll-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_pass_dev_123
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - payroll-network
    depends_on:
      - redis

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  payroll-network:
    driver: bridge