name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password_123
          POSTGRES_USER: test_user
          POSTGRES_DB: payroll_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Setup test database environment
        env:
          DATABASE_URL: "postgresql://test_user:test_password_123@localhost:5432/payroll_test_db"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test-jwt-secret-for-ci"
          NODE_ENV: "test"
        run: |
          echo "DATABASE_URL=$DATABASE_URL" >> .env.test
          echo "REDIS_URL=$REDIS_URL" >> .env.test
          echo "JWT_SECRET=$JWT_SECRET" >> .env.test
          echo "NODE_ENV=$NODE_ENV" >> .env.test

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: "postgresql://test_user:test_password_123@localhost:5432/payroll_test_db"
        run: npx prisma migrate deploy

      - name: Apply RLS policies
        env:
          DATABASE_URL: "postgresql://test_user:test_password_123@localhost:5432/payroll_test_db"
        run: |
          if [ -f "sql/enable-rls-policies.sql" ]; then
            PGPASSWORD=test_password_123 psql -h localhost -U test_user -d payroll_test_db -f sql/enable-rls-policies.sql
          fi

      - name: Lint backend code
        run: npm run lint

      - name: Run backend tests
        env:
          DATABASE_URL: "postgresql://test_user:test_password_123@localhost:5432/payroll_test_db"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test-jwt-secret-for-ci"
          NODE_ENV: "test"
        run: npm test

      - name: Build backend
        run: npm run build

  frontend-tests:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend code
        run: npm run lint

      - name: Type check frontend
        run: npm run type-check

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3001"
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit - Backend
        working-directory: ./backend
        run: npm audit --audit-level moderate

      - name: Run security audit - Frontend
        working-directory: ./frontend
        run: npm audit --audit-level moderate

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password_123
          POSTGRES_USER: test_user
          POSTGRES_DB: payroll_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Setup integration test environment
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql://test_user:test_password_123@localhost:5432/payroll_test_db"
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL: "postgresql://test_user:test_password_123@localhost:5432/payroll_test_db"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test-jwt-secret-for-ci"
          NODE_ENV: "test"
        run: |
          # Start backend in background
          cd backend && npm start &
          BACKEND_PID=$!
          
          # Wait for backend to be ready
          sleep 10
          
          # Run integration tests
          cd ../frontend && npm run test:integration || true
          
          # Cleanup
          kill $BACKEND_PID

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add staging deployment commands here
          # This could be AWS, Azure, Docker, Kubernetes, etc.

  deploy-production:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          # Add production deployment commands here
          # Include additional safety checks and rollback capabilities